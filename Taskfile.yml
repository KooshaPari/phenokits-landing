version: "3"

tasks:
  default:
    desc: Build the Astro site
    deps:
      - build

  build:
    desc: Build the Astro site
    cmds:
      - bun run build

  test:
    desc: Run production build smoke test
    cmds:
      - bun run build

  lint:
    desc: Run Astro type and content checks
    cmds:
      - bunx astro check

  clean:
    desc: Remove generated build artifacts
    cmds:
      - rm -rf dist .astro
